services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: books_db
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-books_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - books-network
    restart: unless-stopped

  # Books API Application
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: books_api
    environment:
      DATABASE_URL: postgres://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/${DB_NAME:-books_db}?sslmode=disable
      SERVER_ENV: ${SERVER_ENV:-development}
      SERVER_PORT: ${SERVER_PORT:-8080}
      SERVER_TLS: ${SERVER_TLS:-false}
      LOGGING_LEVEL: ${LOGGING_LEVEL:-debug}
      LOGGING_FORMAT: ${LOGGING_FORMAT:-json}
      DATABASE_MAX_CONNECTIONS: ${DATABASE_MAX_CONNECTIONS:-25}
      DATABASE_SSL_MODE: ${DATABASE_SSL_MODE:-disable}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./certs:/app/certs
      - ./books.json:/app/books.json
    networks:
      - books-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3

volumes:
  postgres_data:
    driver: local

networks:
  books-network:
    driver: bridge